<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>ELRS Lap Timer</title>
<style>
:root {
  --bg:#0d1117;--sf:#161b22;--sf2:#21262d;--bd:#30363d;
  --tx:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--accent-d:#1f6feb;
  --ok:#3fb950;--err:#f85149;--warn:#d29922;
  --p0:#58a6ff;--p1:#f85149;--p2:#3fb950;--p3:#d29922;
  --p0-bg:rgba(88,166,255,.12);--p1-bg:rgba(248,81,73,.12);
  --p2-bg:rgba(63,185,80,.12);--p3-bg:rgba(210,153,34,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;font-size:14px}
header{position:sticky;top:0;z-index:200;background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 16px}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px}
.logo h1{font-size:16px;color:var(--accent);font-weight:700}
.ws-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.ws-dot.connected{background:var(--ok)}.ws-dot.disconnected{background:var(--err)}
.tab-bar{display:flex;gap:3px}
.tab-btn{flex:1;padding:6px 8px;border-radius:6px;font-size:12px;font-weight:600;background:transparent;color:var(--muted);border:1px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--tx);background:var(--sf2)}
.tab-btn.active{background:var(--accent-d);color:#fff;border-color:var(--accent)}
main{flex:1;max-width:1200px;margin:0 auto;width:100%;padding:16px 12px 32px}
.tab-pane{display:none}.tab-pane.active{display:block}
.section-title{font-size:18px;color:var(--accent);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.section-desc{color:var(--muted);font-size:12px;margin-bottom:12px;line-height:1.6}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:filter .15s,opacity .15s}
button:disabled{opacity:.4;cursor:not-allowed}
button:not(:disabled):hover{filter:brightness(1.15)}
.btn-success{background:var(--ok);color:#000}.btn-danger{background:var(--err);color:#fff}
.btn-secondary{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}
.btn-save{background:var(--accent);color:#000;width:100%;margin-top:10px}
.btn-voice{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);min-width:120px}
.btn-voice.on{background:var(--ok);color:#000;border-color:var(--ok)}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.card-title{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

/* ── Race controls ── */
.race-controls{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 12px;margin-bottom:12px;display:flex;flex-direction:column;align-items:center;gap:10px}
#timer{font-size:44px;font-weight:bold;font-family:"Courier New",monospace;color:var(--accent);letter-spacing:3px}
#timer.running{color:var(--ok)}
.race-buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.lap-count-row{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;flex-wrap:wrap;justify-content:center}
.lap-count-row input[type="number"]{width:56px;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:4px 6px;text-align:center;font-size:14px}

/* ── Pilot race grid ── */
.pilot-race-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pilot-race-card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.pilot-card-header{display:flex;align-items:center;gap:6px;padding:7px 10px;font-weight:700;font-size:13px}
.pilot-card-header.p0{background:var(--p0-bg);border-bottom:2px solid var(--p0);color:var(--p0)}
.pilot-card-header.p1{background:var(--p1-bg);border-bottom:2px solid var(--p1);color:var(--p1)}
.pilot-card-header.p2{background:var(--p2-bg);border-bottom:2px solid var(--p2);color:var(--p2)}
.pilot-card-header.p3{background:var(--p3-bg);border-bottom:2px solid var(--p3);color:var(--p3)}
.p-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-lapcount{font-size:11px;font-weight:normal;color:var(--muted);white-space:nowrap}
.crossing-badge{font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:3px;background:#333;color:var(--muted);display:none}
.crossing-badge.active{display:inline-block;background:currentColor;color:#000}
.rssi-mini-bar{display:flex;align-items:center;gap:5px;padding:3px 8px;background:var(--sf2)}
.rssi-mini-label{font-size:9px;color:var(--muted);width:26px}
.rssi-mini-track{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.rssi-mini-fill{height:100%;width:0%;border-radius:3px;transition:width .05s}
.p0 .rssi-mini-fill,.p0-fill{background:var(--p0)}.p1 .rssi-mini-fill,.p1-fill{background:var(--p1)}
.p2 .rssi-mini-fill,.p2-fill{background:var(--p2)}.p3 .rssi-mini-fill,.p3-fill{background:var(--p3)}
.rssi-mini-val{font-size:10px;color:var(--muted);min-width:36px;text-align:right}
.pilot-best-row{display:flex;align-items:center;gap:6px;padding:4px 8px;background:var(--sf2);border-top:1px solid var(--bd)}
.best-label{font-size:9px;color:var(--muted);width:26px}
.pilot-best{font-size:14px;font-weight:700;color:var(--accent)}
.pilot-delta{font-size:11px;font-weight:700;margin-left:auto}
.pilot-delta.faster{color:var(--ok)}.pilot-delta.slower{color:var(--err)}
.lap-table-wrap{overflow-x:auto;max-height:220px;overflow-y:auto}
.lapTable{width:100%;border-collapse:collapse;font-size:11px}
.lapTable thead th{background:var(--sf2);color:var(--muted);padding:3px 4px;text-align:center;font-weight:normal;font-size:10px;border-bottom:1px solid var(--bd);position:sticky;top:0}
.lapTable tbody td{padding:3px 4px;text-align:center;border-bottom:1px solid var(--bd);color:var(--tx)}
.lapTable tbody td.lap-time{font-size:13px;font-weight:700}
.lapTable tbody tr:hover{background:var(--sf2)}
.lapTable tbody tr.best-row td{color:var(--ok);font-weight:bold}
@keyframes lapFlash{0%{background:rgba(255,255,255,.15)}100%{background:transparent}}
.pilot-race-card.flash{animation:lapFlash .5s ease-out}

/* ── Config / Roster ── */
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-input{flex:1;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:7px 10px;font-size:13px}
.search-input:focus{outline:none;border-color:var(--accent)}
.roster-list{max-height:420px;overflow-y:auto;border:1px solid var(--bd);border-radius:8px}
.roster-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.roster-item:last-child{border-bottom:none}
.roster-item:hover{background:var(--sf2)}
.roster-name{font-weight:600;font-size:13px;flex:1;min-width:80px}
.roster-yomi{font-size:10px;color:var(--muted);display:block;font-weight:normal}
.roster-mac{font-family:monospace;font-size:11px;color:var(--muted);min-width:120px}
.active-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.active-badge.p0{background:var(--p0-bg);color:var(--p0);border:1px solid var(--p0)}
.active-badge.p1{background:var(--p1-bg);color:var(--p1);border:1px solid var(--p1)}
.active-badge.p2{background:var(--p2-bg);color:var(--p2);border:1px solid var(--p2)}
.active-badge.p3{background:var(--p3-bg);color:var(--p3);border:1px solid var(--p3)}
.online-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(63,185,80,.15);color:var(--ok);border:1px solid var(--ok);white-space:nowrap}
.roster-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.roster-item input[type="text"]{background:var(--bg);border:1px solid var(--accent);color:var(--tx);border-radius:5px;padding:3px 7px;font-size:12px}
/* Per-pilot channel dropdown in roster */
.ch-select{background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:5px;padding:3px 5px;font-size:11px;cursor:pointer}

/* ── Calib ── */
.calib-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.calib-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.calib-header{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;font-weight:700;font-size:13px}
.calib-header.p0{background:var(--p0-bg);border-bottom:2px solid var(--p0);color:var(--p0)}
.calib-header.p1{background:var(--p1-bg);border-bottom:2px solid var(--p1);color:var(--p1)}
.calib-header.p2{background:var(--p2-bg);border-bottom:2px solid var(--p2);color:var(--p2)}
.calib-header.p3{background:var(--p3-bg);border-bottom:2px solid var(--p3);color:var(--p3)}
.rssi-live-badge{font-size:11px;font-weight:normal}
.rssi-live-badge strong{font-weight:700}
.calib-card canvas{width:100%;height:130px;display:block;background:var(--bg)}
.calib-sliders{padding:8px 12px;display:flex;flex-direction:column;gap:8px}

/* Item 4: calib layout overflow fix */
.config-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:nowrap}
.config-row label{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;width:70px;flex-shrink:0}
.slider-num{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
.slider-num input[type="range"]{flex:1;min-width:50px;accent-color:var(--accent);cursor:pointer}
.slider-num input[type="number"]{width:50px;flex-shrink:0;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:4px 3px;font-size:12px;text-align:center}
.slider-num input[type="number"]:focus{outline:none;border-color:var(--accent)}
.unit{font-size:10px;color:var(--muted);flex-shrink:0}

/* ── Global config ── */
.global-config-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.global-title{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.voice-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* Global settings config-row label override (wider) */
.global-config-card .config-row label{width:110px;font-size:10px}

/* ── Footer / Toast ── */
footer{background:var(--sf);border-top:1px solid var(--bd);text-align:center;padding:10px;font-size:12px;color:var(--muted)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--sf2);color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:10px 20px;font-size:13px;z-index:1000;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:900px){.pilot-race-grid{grid-template-columns:1fr 1fr}.calib-grid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){
  .header-inner{flex-direction:column;gap:6px;align-items:flex-start}
  .pilot-race-grid{grid-template-columns:1fr 1fr}.calib-grid{grid-template-columns:1fr 1fr}
  #timer{font-size:32px}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <h1>ELRS Lap Timer</h1>
      <span id="wsDot" class="ws-dot disconnected"></span>
    </div>
    <nav class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('race')">🏁 レース</button>
      <button class="tab-btn"        onclick="switchTab('config')">⚙️ 設定</button>
      <button class="tab-btn"        onclick="switchTab('calib')">📡 キャリブ</button>
    </nav>
  </div>
</header>

<main>

<!-- ═══════════════════════════ RACE ═══════════════════════════ -->
<section id="pane-race" class="tab-pane active">

  <!-- レース制御 (Item 2: パイロット選択カードを削除) -->
  <div class="race-controls">
    <div id="timer">00:00</div>
    <div class="race-buttons">
      <button id="btnStart" onclick="startRace()" class="btn-success">▶ スタート</button>
      <button id="btnStop"  onclick="stopRace()"  class="btn-danger" disabled>■ ストップ</button>
      <button onclick="clearAllLaps()" class="btn-secondary">クリア</button>
    </div>
    <div class="lap-count-row">
      <label>総周回数:</label>
      <input type="number" id="totalLaps" min="0" max="99" value="0">
      <span style="font-size:11px;color:var(--muted)">（0=無制限）</span>
      <span style="color:var(--bd);margin:0 4px">｜</span>
      <button id="voiceBtn" onclick="toggleVoice()" class="btn-voice on">🔊 音声 ON</button>
    </div>
  </div>

  <!-- 4チャンネル レースカード (パイロットはConfig画面のドロップダウンで割当) -->
  <div class="pilot-race-grid" id="pilotGrid"></div>
</section>

<!-- ═══════════════════════════ CONFIG ════════════════════════ -->
<section id="pane-config" class="tab-pane">
  <h2 class="section-title">設定</h2>

  <!-- 機体スキャン -->
  <div class="global-config-card">
    <h3 class="global-title">📡 機体スキャン</h3>
    <p class="section-desc">機体（XIAO ESP32-C3）の電源を入れると自動検出されます。名前を入力してパイロット情報に登録してください。</p>
    <div id="scanList" style="min-height:32px"><span style="color:var(--muted);font-size:12px">スキャン待機中... 機体の電源を入れてください</span></div>
    <button onclick="clearScan()" class="btn-secondary" style="width:100%;margin-top:8px;font-size:12px">スキャンリストをクリア</button>
  </div>

  <!-- パイロット情報 (Item 12: ロースター→パイロット情報) -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="card-title" style="margin:0">👥 パイロット情報 <span id="rosterCountBadge" style="color:var(--muted);font-weight:normal"></span></div>
      <button onclick="showAddForm()" class="btn-success" style="font-size:12px;padding:5px 12px">＋ 追加</button>
    </div>
    <div class="search-row">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 名前・MACで検索..." oninput="renderRoster()">
    </div>
    <!-- 新規パイロット追加フォーム -->
    <div id="addForm" style="display:none;background:var(--sf2);border:1px solid var(--accent);border-radius:8px;padding:10px 12px;margin-bottom:10px">
      <div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:8px">新規パイロット追加</div>
      <div class="config-row" style="gap:8px"><label style="width:70px;font-size:11px">名前</label><input type="text" id="addName" placeholder="パイロット名" maxlength="20" autocomplete="off" style="flex:1;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:5px 8px;font-size:13px"></div>
      <div class="config-row" style="gap:8px"><label style="width:70px;font-size:11px">読み方</label><input type="text" id="addYomi" placeholder="パイロット名のよみかた" maxlength="20" autocomplete="off" style="flex:1;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:5px 8px;font-size:13px"></div>
      <div class="config-row" style="gap:8px"><label style="width:70px;font-size:11px">機体 MAC</label><input type="text" id="addMac" placeholder="AA:BB:CC:DD:EE:FF" maxlength="17" autocomplete="off" style="flex:1;font-family:monospace;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:5px 8px;font-size:13px"></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button onclick="submitAdd()" class="btn-success" style="flex:1;font-size:12px">登録</button>
        <button onclick="hideAddForm()" class="btn-secondary" style="flex:1;font-size:12px">キャンセル</button>
      </div>
    </div>
    <div class="roster-list" id="rosterList"></div>
  </div>

  <!-- グローバル設定 (Item 10: 保存ボタン削除、changeで自動保存) -->
  <div class="global-config-card">
    <h3 class="global-title">グローバル設定</h3>
    <div style="padding:0">
      <div class="config-row">
        <label>アナウンス</label>
        <select id="announceMode" onchange="saveGlobalConfig()" style="flex:1;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:6px 8px;font-size:13px">
          <option value="laptime">名前＆ラップタイム</option>
          <option value="lap_laptime">名前＆周回数＆ラップタイム</option>
          <option value="beep">ビープ音のみ</option>
          <option value="none">なし</option>
        </select>
      </div>
      <div class="config-row">
        <label>読み上げ速度</label>
        <div class="slider-num">
          <input type="range" id="speechRate" min="0.5" max="2.0" step="0.1" value="1.1"
            oninput="document.getElementById('speechRateN').value=this.value;saveGlobalConfig()">
          <input type="number" id="speechRateN" min="0.5" max="2.0" step="0.1" value="1.1"
            onchange="document.getElementById('speechRate').value=Math.min(2,Math.max(0.5,+this.value));saveGlobalConfig()">
        </div>
      </div>
    </div>
    <div class="voice-row">
      <button id="voiceBtn2" onclick="toggleVoice()" class="btn-voice on">🔊 音声 ON</button>
      <button onclick="testVoice()" class="btn-secondary">🔊 テスト</button>
    </div>
  </div>

  <!-- SDカードセクション (Item 7: sdPresent=trueの時のみ表示) -->
  <div class="global-config-card" id="sdSection" style="display:none">
    <h3 class="global-title">💾 SDカード</h3>
    <p class="section-desc">パイロット情報をSDカードにバックアップ・復元します。</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="sdBackup()" class="btn-secondary" style="flex:1">📥 SDバックアップ保存</button>
      <button onclick="sdRestore()" class="btn-secondary" style="flex:1">📤 SDから復元</button>
    </div>
  </div>
</section>

<!-- ═══════════════════════════ CALIB ════════════════════════ -->
<section id="pane-calib" class="tab-pane">
  <h2 class="section-title">キャリブレーション</h2>
  <p class="section-desc">アクティブパイロットの RSSI リアルタイム波形と検知閾値。Enter &gt; Exit になるよう設定します。</p>
  <div class="calib-grid" id="calibGrid"></div>
</section>

</main>
<footer><p>ELRS Lap Timer — MAX 50 pilots</p></footer>
<div id="toast" class="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// 定数・グローバル状態
// ═══════════════════════════════════════════════════════════════════
const PCOLORS = ['var(--p0)','var(--p1)','var(--p2)','var(--p3)'];
const PCLS    = ['p0','p1','p2','p3'];
const N = 4;

// レーススロット状態 (インデックス = チャンネル 0-3)
const slots = Array.from({length:N}, (_,i) => ({
  id:i, name:'---', yomi:'', rosterIdx:-1, rssi:-120, crossing:false,
  lapCount:0, bestLapMs:0, lapTimes:[], cumulative:0,
  enterRssi:-80, exitRssi:-90
}));

// ロースターデータ (サーバーから取得)
var rosterData = [];   // [{id,name,yomi,uid,activeSlot,enter,exit}]
var activeSlotsLocal = [-1,-1,-1,-1]; // 現在のスロット割当 (roster indices)

var raceRunning=false, raceStartPerf=0, timerH=null;
var voiceEnabled = localStorage.getItem('voice')!=='0';
var announceMode = localStorage.getItem('announce')||'laptime';
var speechRate   = parseFloat(localStorage.getItem('srate')||'1.1');

// スキャン結果: mac → {rssi, ts, assignedRosterId, pilotName, inputName, receivedAt}
var scanResults  = {};

var editingRosterId = null;  // ロースター編集中の pilot id (null=非編集)
var sdPresent = false;       // SDカードの有無 (gate_nodeから報告)

// キャリブ自動保存のデバウンスタイマー
var calibSaveTimers = {};

// ═══════════════════════════════════════════════════════════════════
// トースト通知
// ═══════════════════════════════════════════════════════════════════
function toast(msg, dur) {
  dur=dur||2000;
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

// ═══════════════════════════════════════════════════════════════════
// 音声・効果音
// ═══════════════════════════════════════════════════════════════════
var actx=null;
function ensureAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}
function beep(freq,dur,type,vol){if(!actx)return;type=type||'sine';vol=vol===undefined?0.4:vol;var o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.frequency.value=freq;o.type=type;var t=actx.currentTime;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);}
function beepSeq(notes){notes.forEach(n=>setTimeout(()=>beep(n[0],n[1],n[2]),n[3]||0));}
var sfx={
  lap:()=>beep(880,.15),
  best:()=>beepSeq([[880,.1,'sine',0],[1320,.1,'sine',120],[1760,.15,'sine',240]]),
  count:()=>beepSeq([[440,.12,'sine',0],[440,.12,'sine',1000],[440,.12,'sine',2000],[880,.3,'sine',3000]])
};

// ═══════════════════════════════════════════════════════════════════
// 音声読み上げ (Item 13: yomiフィールドを使用)
// ═══════════════════════════════════════════════════════════════════
var speechQ=[],speechBusy=false;
function speak(text){
  if(!voiceEnabled||announceMode==='none'){sfx.lap();return;}
  if(announceMode==='beep'){sfx.lap();return;}
  speechQ.push(text);if(!speechBusy)nextSpeech();
}
function nextSpeech(){
  if(!speechQ.length){speechBusy=false;return;}
  speechBusy=true;
  var u=new SpeechSynthesisUtterance(speechQ.shift());
  u.lang='ja-JP';u.rate=speechRate;
  var timeout=setTimeout(()=>{speechSynthesis.cancel();speechBusy=false;nextSpeech();},5000);
  u.onend=()=>{clearTimeout(timeout);setTimeout(nextSpeech,80);};
  u.onerror=()=>{clearTimeout(timeout);speechBusy=false;nextSpeech();};
  speechSynthesis.speak(u);
}
// パイロットの読み上げ名: yomiがあればyomiを使用、なければname
function getSpokenName(p){return (p.yomi&&p.yomi!=='')?p.yomi:p.name;}
function buildSpeech(p, lapCount, lapMs) {
  var spokenName=getSpokenName(p);
  var s=Math.floor(lapMs/1000),ms=Math.floor((lapMs%1000)/100);
  var m=Math.floor(s/60);s=s%60;
  var tStr=m>0?m+'分'+s+'秒'+ms:s+'秒'+ms;
  if(announceMode==='lap_laptime') return spokenName+'、'+lapCount+'周、'+tStr;
  return spokenName+'、'+tStr;
}
function testVoice(){
  ensureAudio();sfx.lap();
  if(voiceEnabled&&announceMode!=='beep'&&announceMode!=='none'){
    var u=new SpeechSynthesisUtterance('テスト、1分23秒4');u.lang='ja-JP';u.rate=speechRate;speechSynthesis.speak(u);
  }
}
function toggleVoice(){voiceEnabled=!voiceEnabled;localStorage.setItem('voice',voiceEnabled?'1':'0');refreshVoiceBtns();}
function refreshVoiceBtns(){
  ['voiceBtn','voiceBtn2'].forEach(id=>{var b=document.getElementById(id);if(!b)return;
    b.textContent=voiceEnabled?'🔊 音声 ON':'🔇 音声 OFF';b.className='btn-voice'+(voiceEnabled?' on':'');});
}

// ═══════════════════════════════════════════════════════════════════
// フォーマット関数
// ═══════════════════════════════════════════════════════════════════
function pad(n,w){return String(n).padStart(w,'0')}
function fmt(ms){if(!ms)return'--:--.---';var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),f=ms%1000;return m+':'+pad(s,2)+'.'+pad(f,3);}
function fmtTimer(ms){var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);if(h>0)return pad(h,2)+':'+pad(m,2)+':'+pad(s,2)+'.'+pad(cs,2);return pad(m,2)+':'+pad(s,2)+'.'+pad(cs,2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dbPct(db){
  // RSSI棒グラフ用 (-120〜-40の範囲で0-100%)
  return Math.max(0,Math.min(100,((db-(-120))/((-40)-(-120)))*100));
}
function fmtDelta(ms){return(ms>0?'+':'')+(ms/1000).toFixed(3)+'s';}

// レースタイマー
// ═══════════════════════════════════════════════════════════════════
var timerEl=document.getElementById('timer');
var countdownH=null;   // カウントダウン用インターバル

// レースタイマー開始 (race_start WS受信時に呼ばれる)
function startTimer(){
  // カウントダウン中だった場合は停止
  if(countdownH){clearInterval(countdownH);countdownH=null;}
  raceStartPerf=performance.now();
  timerEl.classList.add('running');
  // 50ms間隔でコンマ第2位まで更新
  if(timerH)clearInterval(timerH);
  timerH=setInterval(()=>{timerEl.textContent=fmtTimer(performance.now()-raceStartPerf);},50);
}
function stopTimer(){clearInterval(timerH);timerH=null;timerEl.classList.remove('running');}

function addLapRow(p, lapMs, cumMs){
  var tbody=document.getElementById('lapBody'+p.id);
  var isBest=(p.bestLapMs===lapMs&&lapMs>0);
  if(isBest)tbody.querySelectorAll('tr.best-row').forEach(r=>r.classList.remove('best-row'));
  var tr=document.createElement('tr');
  if(isBest)tr.className='best-row';
  tr.innerHTML='<td>'+p.lapCount+'</td><td class="lap-time">'+fmt(lapMs)+'</td><td>'+fmt(cumMs)+'</td>';
  tbody.insertBefore(tr,tbody.firstChild);
  var delta=document.getElementById('rcDelta'+p.id);
  if(p.bestLapMs&&lapMs){var d=lapMs-p.bestLapMs;if(d===0){delta.textContent='★ BEST';delta.className='pilot-delta faster';}else{delta.textContent=fmtDelta(d);delta.className='pilot-delta '+(d<0?'faster':'slower');}}
  var card=document.getElementById('rc-'+p.id);
  card.classList.remove('flash');void card.offsetWidth;card.classList.add('flash');
  card.addEventListener('animationend',()=>card.classList.remove('flash'),{once:true});
}

// スロット→ロースター同期
// ═══════════════════════════════════════════════════════════════════
function applyActiveToSlots(){
  for(var s=0;s<N;s++){
    var ri=activeSlotsLocal[s];
    var r=rosterData.find(x=>x.id===ri);
    slots[s].rosterIdx=ri;
    slots[s].name=r?r.name:'---';
    slots[s].yomi=r?r.yomi:'';
    slots[s].enterRssi=r?r.enter:-80;
    slots[s].exitRssi =r?r.exit :-90;
  }
}

// ═══════════════════════════════════════════════════════════════════
// パイロット情報 (ロースター) — Item 2: チャンネル割当ドロップダウン付き
// ═══════════════════════════════════════════════════════════════════
function renderRoster(){
  // Item 9: 再描画前に入力中の名前を保存
  Object.keys(scanResults).forEach(mac => {
    var macId = mac.replace(/:/g, '');
    var el = document.getElementById('scanName-' + macId);
    if (el && el.value.trim()) scanResults[mac].inputName = el.value;
  });

  var filter=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  var list=document.getElementById('rosterList');
  var badge=document.getElementById('rosterCountBadge');
  badge.textContent='('+rosterData.length+'/50)';

  var filtered=rosterData.filter(function(r){
    if(!filter)return true;
    return r.name.toLowerCase().includes(filter)||(r.uid||'').toLowerCase().includes(filter);
  });

  // Item 8: オンラインのパイロットを先頭に並べ替え
  var now=Date.now();
  filtered.sort(function(a,b){
    var aOn=isOnline(a.uid,now),bOn=isOnline(b.uid,now);
    if(aOn&&!bOn)return -1;
    if(!aOn&&bOn)return 1;
    return a.id-b.id;
  });

  if(!filtered.length){
    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">'+(rosterData.length?'該当なし':'パイロット未登録')+'</div>';
    return;
  }

  list.innerHTML='';
  filtered.forEach(function(r){
    var isEditing=(editingRosterId===r.id);
    var item=document.createElement('div');item.className='roster-item';item.id='ri-'+r.id;
    var onlineMark=isOnline(r.uid,now)?'<span class="online-badge">📶 オンライン</span>':'';

    // アクティブバッジ
    var activeBadge='';
    if(r.activeSlot>=0)activeBadge='<span class="active-badge '+PCLS[r.activeSlot]+'">Ch'+(r.activeSlot+1)+'</span>';

    if(isEditing){
      // Item 11: 編集フォーム (保存後にリスト表示に戻る)
      item.innerHTML=
        '<div style="flex:1;min-width:160px;display:flex;flex-direction:column;gap:4px">'
          +'<input type="text" id="editName" value="'+esc(r.name)+'" maxlength="20" placeholder="パイロット名" autocomplete="off" style="background:var(--bg);border:1px solid var(--accent);color:var(--tx);border-radius:5px;padding:3px 7px;font-size:12px;width:100%">'
          +'<input type="text" id="editYomi" value="'+esc(r.yomi||'')+'" maxlength="20" placeholder="読み方（よみかた）" autocomplete="off" style="background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:5px;padding:3px 7px;font-size:11px;width:100%">'
        +'</div>'
        +'<input type="text" id="editMac" value="'+esc(r.uid||'')+'" maxlength="17" placeholder="AA:BB:CC:DD:EE:FF" style="width:140px;font-family:monospace;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:5px;padding:3px 7px;font-size:12px" autocomplete="off">'
        +'<div class="roster-actions">'
          +'<button onclick="submitEdit('+r.id+')" class="btn-success" style="font-size:11px;padding:3px 9px">保存</button>'
          +'<button onclick="cancelEdit()" class="btn-secondary" style="font-size:11px;padding:3px 9px">×</button>'
        +'</div>';
    } else {
      // チャンネル割当ドロップダウン (Item 2)
      var chOpts='<option value="-1"'+(r.activeSlot<0?' selected':'')+'>未割当</option>';
      for(var ch=0;ch<N;ch++){
        var selAttr=(r.activeSlot===ch)?' selected':'';
        chOpts+='<option value="'+ch+'"'+selAttr+'>Ch'+(ch+1)+'</option>';
      }
      var yomiLine=r.yomi?'<span class="roster-yomi">'+esc(r.yomi)+'</span>':'';
      item.innerHTML=
        '<div style="flex:1;min-width:80px">'
          +'<span class="roster-name">'+esc(r.name)+yomiLine+'</span>'
        +'</div>'
        +'<span class="roster-mac">'+(r.uid||'<span style="color:var(--err)">MAC未設定</span>')+'</span>'
        +onlineMark
        +activeBadge
        +'<div class="roster-actions">'
          +'<select class="ch-select" data-rid="'+r.id+'" onchange="onChSelectChange(this)">'
            +chOpts
          +'</select>'
          +'<button onclick="startEdit('+r.id+')" class="btn-secondary" style="font-size:11px;padding:3px 8px">編集</button>'
          +'<button onclick="deleteRosterPilot('+r.id+')" class="btn-danger" style="font-size:11px;padding:3px 8px">削除</button>'
        +'</div>';
    }
    list.appendChild(item);
  });
}

// Item 8: MACがスキャン結果に30秒以内に見えているか確認
function isOnline(uid, now){
  if(!uid)return false;
  var sr=scanResults[uid.toUpperCase()]||scanResults[uid];
  if(!sr)return false;
  return sr.receivedAt && (now - sr.receivedAt < 30000);
}

// Item 2: チャンネルドロップダウン変更 → POST /api/active で即座に保存
async function onChSelectChange(sel){
  var rid=parseInt(sel.dataset.rid);
  var newCh=parseInt(sel.value); // -1=未割当, 0-3=チャンネル
  var newSlots=activeSlotsLocal.slice();

  // 同じパイロットが既に別チャンネルに割り当てられていたら解除
  for(var i=0;i<N;i++) if(newSlots[i]===rid) newSlots[i]=-1;

  // 他のパイロットが対象チャンネルを使用していたら解除
  if(newCh>=0){
    for(var i=0;i<N;i++) if(newSlots[i]!==rid&&newSlots[i]===newSlots[newCh])newSlots[i]=-1;
    newSlots[newCh]=rid;
  }

  try{
    var r=await fetch('/api/active',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slots:newSlots})});
    if(r.ok){
      activeSlotsLocal=newSlots;
      applyActiveToSlots();
      buildRaceCards();
      buildCalibCards();
      await loadRoster(); // バッジを更新するため再描画
      toast('✅ チャンネル割当を保存しました');
    }else toast('⚠️ 保存エラー');
  }catch(e){toast('⚠️ 接続エラー');}
}

  var validMac=/^[0-9A-F]{2}(:[0-9A-F]{2}){5}$/.test(mac);

      +  '<button id="scanBtn-'+macId+'" onclick="registerScanPilot(\''+mac+'\')" class="btn-success" style="font-size:12px;padding:5px 12px;white-space:nowrap"'+(done?' disabled':'')+'>パイロット情報に追加</button>'

async function registerScanPilot(mac){
  var macId=mac.replace(/:/g,'');
  var nameEl=document.getElementById('scanName-'+macId);
  if(!nameEl)return;
  var name=nameEl.value.trim();
  if(!name){toast('⚠️ 名前を入力してください');return;}
  try{
    var r=await fetch('/api/pilots',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,yomi:'',uid:mac})});
    if(!r.ok){toast('⚠️ 登録エラー');return;}
    var body=await r.json();
    scanResults[mac].assignedRosterId=body.id;
    scanResults[mac].pilotName=name;
    scanResults[mac].inputName='';
    await loadRoster();
    updateScanList();
    toast('✓ '+name+' をパイロット情報に追加しました');
  }catch(e){toast('⚠️ 接続エラー');}
}

async function sdRestore(){
  if(!confirm('SDカードからパイロット情報を復元します。現在のデータは上書きされます。よろしいですか？'))return;
  try{
    var r=await fetch('/api/sd/pilots/restore',{method:'POST'});
    if(r.ok)toast('📤 復元要求を送信しました。完了まで少々お待ちください…',4000);
    else toast('⚠️ 復元エラー');
  }catch(e){toast('⚠️ 接続エラー');}
}

// ═══════════════════════════════════════════════════════════════════
// キャリブレーション (Item 1/5/10)
// ═══════════════════════════════════════════════════════════════════
var charts={};
var chartDirty=[false,false,false,false];  // rAFループ用ダーティフラグ

// 項目3: requestAnimationFrameによる60fpsスムーズ描画
// キャリブタブがアクティブな時のみ描画しCPUを節約
(function chartLoop(){
  requestAnimationFrame(chartLoop);
  var calibActive=document.getElementById('pane-calib').classList.contains('active');
  for(var i=0;i<N;i++){
    if(chartDirty[i]&&charts[i]){
      if(calibActive)drawChart(i);
      chartDirty[i]=false;
    }
  }
})();

function buildCalibCards(){
  var g=document.getElementById('calibGrid');g.innerHTML='';
  slots.forEach(function(p){
    var d=document.createElement('div');d.className='calib-card';
    d.innerHTML=
      '<div class="calib-header '+PCLS[p.id]+'">'
        +'<span id="calName'+p.id+'">'+esc(p.name==='---'?'Ch'+(p.id+1):p.name)+'</span>'
        +'<span class="rssi-live-badge">RSSI: <strong id="calRssi'+p.id+'">---</strong> dBm</span>'
      +'</div>'
      +'<canvas id="calCanvas'+p.id+'"></canvas>'
      +'<div class="calib-sliders">'
        +'<div class="config-row"><label>Enter（入）</label>'
          +'<div class="slider-num">'
            +'<input type="range" id="calEnter'+p.id+'" min="-100" max="-10" step="1" value="'+p.enterRssi+'" oninput="syncCalib('+p.id+',\'enter\')">'
            +'<input type="number" id="calEnterN'+p.id+'" min="-100" max="-10" step="1" value="'+p.enterRssi+'" onchange="syncCalibN('+p.id+',\'enter\')">'
            +'<span class="unit">dBm</span>'
          +'</div></div>'
        +'<div class="config-row"><label>Exit（出）</label>'
          +'<div class="slider-num">'
            +'<input type="range" id="calExit'+p.id+'" min="-100" max="-10" step="1" value="'+p.exitRssi+'" oninput="syncCalib('+p.id+',\'exit\')">'
            +'<input type="number" id="calExitN'+p.id+'" min="-100" max="-10" step="1" value="'+p.exitRssi+'" onchange="syncCalibN('+p.id+',\'exit\')">'
            +'<span class="unit">dBm</span>'
          +'</div></div>'
      +'</div>';
    // Item 10: 保存ボタン削除 (changeイベントで自動保存)
    g.appendChild(d);
    // Item 1: タブ非表示時でもcanvasサイズを確保するため遅延初期化
    setTimeout(()=>initChart(p.id),0);
  });
}

// Item 1/5: チャートの初期化 (タブが隠れていてもデフォルトサイズで初期化)
function initChart(id){
  var cv=document.getElementById('calCanvas'+id);if(!cv)return;
  // offsetWidthが0の場合（タブ非表示時）はデフォルト値を使用
  cv.width = cv.offsetWidth || cv.parentElement.offsetWidth || 300;
  cv.height = 130;
  charts[id]={cv,ctx:cv.getContext('2d'),data:new Float32Array(200).fill(-120),cross:new Uint8Array(200)};
  drawChart(id);
}

function pushChart(id,rssi,crossing){
  var c=charts[id];if(!c)return;
  c.data.copyWithin(0,1);c.data[199]=rssi;c.cross.copyWithin(0,1);c.cross[199]=crossing?1:0;
  chartDirty[id]=true;  // rAFループに描画を委任
}

// Item 5: 動的Y軸スケール
function calcChartRange(id){
  var c=charts[id];var p=slots[id];
  // 実際のRSSIデータ（-120埋め値を無視）のmin/max
  var hasData=false;var dMin=0;var dMax=-200;
  for(var i=0;i<200;i++){
    if(c.data[i]>-119){  // -120は初期値なのでスキップ
      if(!hasData||c.data[i]<dMin)dMin=c.data[i];
      if(!hasData||c.data[i]>dMax)dMax=c.data[i];
      hasData=true;
    }
  }
  // 閾値も範囲に含める
  var allVals=hasData?[dMin,dMax,p.enterRssi,p.exitRssi]:[p.enterRssi,p.exitRssi];
  var yMin=Math.min.apply(null,allVals)-5;  // 5dBmパディング
  var yMax=Math.max.apply(null,allVals)+5;
  // 最小レンジ20dBm
  if(yMax-yMin<20){var mid=(yMax+yMin)/2;yMin=mid-10;yMax=mid+10;}
  return {yMin,yMax};
}

function drawChart(id){
  var c=charts[id];if(!c)return;
  var cv=c.cv,ctx=c.ctx,w=cv.width,h=cv.height,p=slots[id];
  // 動的スケール計算
  var range=calcChartRange(id);
  var yMin=range.yMin,yMax=range.yMax,rng=yMax-yMin;
  var toY=function(v){return h-((Math.max(yMin,Math.min(yMax,v))-yMin)/rng)*h;};
  var dx=w/200;
  var col=getComputedStyle(document.documentElement).getPropertyValue('--p'+id).trim();
  // 背景クリア
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,w,h);
  // CROSSING区間をハイライト
  ctx.fillStyle=col+'22';
  for(var i=0;i<200;i++)if(c.cross[i])ctx.fillRect(i*dx,0,dx+1,h);
  // Y軸グリッド線 (10dBm刻みで範囲内のものを描画)
  ctx.strokeStyle='#1e2530';ctx.lineWidth=1;ctx.setLineDash([]);
  var tickStart=Math.ceil(yMin/10)*10;
  for(var db=tickStart;db<=yMax;db+=10){
    var ty=toY(db);
    ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(w,ty);ctx.stroke();
    // Y軸ラベル
    ctx.fillStyle='#444';ctx.font='9px monospace';ctx.fillText(db+'dB',2,ty-2);
  }
  // Enter閾値 (緑破線)
  ctx.setLineDash([4,4]);ctx.lineWidth=1;
  ctx.strokeStyle='#3fb95088';ctx.beginPath();ctx.moveTo(0,toY(p.enterRssi));ctx.lineTo(w,toY(p.enterRssi));ctx.stroke();
  // Exit閾値 (赤破線)
  ctx.strokeStyle='#f8514988';ctx.beginPath();ctx.moveTo(0,toY(p.exitRssi));ctx.lineTo(w,toY(p.exitRssi));ctx.stroke();
  ctx.setLineDash([]);
  // 項目2: RSSI線以下を薄い色で塗りつぶし (エリアチャート)
  ctx.beginPath();
  for(var j=0;j<200;j++){var x=j*dx,y=toY(c.data[j]);j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  ctx.fillStyle=col+'28';  // 約16%透過
  ctx.fill();
  // RSSIの波形 (塗りつぶしの上に重ねる)
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();
  for(var j=0;j<200;j++){var x=j*dx,y=toY(c.data[j]);j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.stroke();
}

function syncCalib(id,which){
  var v=parseInt(document.getElementById('cal'+cap(which)+id).value);
  document.getElementById('cal'+cap(which)+'N'+id).value=v;
  slots[id][which+'Rssi']=v;drawChart(id);
  // Item 10: 変更後にデバウンスして自動保存
  scheduleCalibSave(id);
}
function syncCalibN(id,which){
  var el=document.getElementById('cal'+cap(which)+'N'+id);
  var v=Math.max(-100,Math.min(-10,parseInt(el.value)||(-80)));
  el.value=v;document.getElementById('cal'+cap(which)+id).value=v;
  slots[id][which+'Rssi']=v;drawChart(id);
  scheduleCalibSave(id);
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// Item 10: デバウンス自動保存 (800ms)
function scheduleCalibSave(slotId){
  if(calibSaveTimers[slotId])clearTimeout(calibSaveTimers[slotId]);
  calibSaveTimers[slotId]=setTimeout(()=>saveCalibConfig(slotId),800);
}

async function saveCalibConfig(slotId){
  var enter=parseInt(document.getElementById('calEnterN'+slotId).value);
  var exit_=parseInt(document.getElementById('calExitN'+slotId).value);
  if(enter<=exit_){toast('⚠️ Enter > Exit にしてください');return;}
  var ri=activeSlotsLocal[slotId];
  if(ri<0){return;}  // スロット未割当時はスキップ
  slots[slotId].enterRssi=enter;slots[slotId].exitRssi=exit_;
  try{
    var r=await fetch('/api/calib',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:ri,enter,exit:exit_})});
    if(r.ok){
      var rd=rosterData.find(x=>x.id===ri);if(rd){rd.enter=enter;rd.exit=exit_;}
      toast('💾 閾値を保存しました',1500);
    }else toast('⚠️ 保存エラー');
  }catch(e){toast('⚠️ 接続エラー');}
}

// ═══════════════════════════════════════════════════════════════════
// タブ切替 (Item 1: キャリブタブに切り替わった時にチャートをリサイズ)
// ═══════════════════════════════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[['race','config','calib'].indexOf(tab)].classList.add('active');
  if(tab==='calib'){
    // タブ表示後にcanvasサイズを実際の幅に合わせてリサイズ・再描画
    setTimeout(()=>{
      slots.forEach(p=>{
        var c=charts[p.id];
        if(!c)return;
        var newW=c.cv.offsetWidth||300;
        if(newW!==c.cv.width){c.cv.width=newW;}
        drawChart(p.id);
      });
    },50);
  }
}

// ═══════════════════════════════════════════════════════════════════
// レース制御
// ═══════════════════════════════════════════════════════════════════
function startRace(){
  ensureAudio();
  sfx.count();  // 0/1/2/3秒にビープ音

  // 項目7: メインタイマーに3→0のカウントダウンを表示
  var cdStart=performance.now();
  timerEl.classList.remove('running');
  timerEl.textContent='3.00';
  if(countdownH)clearInterval(countdownH);
  countdownH=setInterval(()=>{
    var rem=Math.max(0,3000-(performance.now()-cdStart));
    timerEl.textContent=(rem/1000).toFixed(2);
    if(rem===0){clearInterval(countdownH);countdownH=null;}
  },50);

  // 3.3秒後にレーススタートをサーバーに送信 (race_start WSが返ったらstartTimerが呼ばれる)
  setTimeout(async()=>{try{await fetch('/api/race/start',{method:'POST'});}catch(e){}},3300);
}
function stopRace(){
  ensureAudio();beepSeq([[880,.2,'sine',0],[440,.2,'sine',220],[220,.3,'sine',440]]);
  fetch('/api/race/stop',{method:'POST'}).catch(()=>{});
}
function clearAllLaps(){
  slots.forEach(p=>{
    p.lapCount=0;p.bestLapMs=0;p.lapTimes=[];p.cumulative=0;
    var b=document.getElementById('lapBody'+p.id);if(b)b.innerHTML='';
    var d=document.getElementById('rcDelta'+p.id);if(d)d.textContent='';
    updateRaceCard(p);
  });
}
function setBtns(running){
  document.getElementById('btnStart').disabled=running;
  document.getElementById('btnStop').disabled=!running;
}
function checkFinished(p){
  var tot=parseInt(document.getElementById('totalLaps').value)||0;
  if(!raceRunning||tot===0)return;
  if(p.lapCount>=tot){
    beepSeq([[880,.2,'sine',0],[1320,.2,'sine',220],[1760,.3,'sine',440]]);
    if(voiceEnabled&&announceMode!=='beep'&&announceMode!=='none'){
      var u=new SpeechSynthesisUtterance(getSpokenName(p)+'、フィニッシュ');u.lang='ja-JP';u.rate=speechRate;speechSynthesis.speak(u);
    }
  }
}

// Item 10: グローバル設定をlocalStorageに自動保存 (ボタン不要)
function saveGlobalConfig(){
  announceMode=document.getElementById('announceMode').value;
  speechRate=parseFloat(document.getElementById('speechRateN').value)||1.1;
  localStorage.setItem('announce',announceMode);
  localStorage.setItem('srate',String(speechRate));
}

// ═══════════════════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════════════════
var wsConn=null,wsRetry=1000;
var wsDot=document.getElementById('wsDot');
function wsConnect(){
  wsConn=new WebSocket('ws://'+location.host+'/ws');
  wsConn.onopen=()=>{wsRetry=1000;wsDot.className='ws-dot connected';};
  wsConn.onerror=()=>wsConn.close();
  wsConn.onclose=()=>{wsDot.className='ws-dot disconnected';setTimeout(()=>{wsRetry=Math.min(wsRetry*2,16000);wsConnect();},wsRetry);};
  wsConn.onmessage=e=>{var d;try{d=JSON.parse(e.data);}catch(ex){return;}onMsg(d);};
}

function onMsg(d){
  if(d.type==='init'){
    raceRunning=d.raceRunning||false;setBtns(raceRunning);
    if(raceRunning)startTimer();
    // SDカード状態を反映
    if(d.sdPresent!==undefined)updateSdSection(d.sdPresent);
    (d.pilots||[]).forEach(pd=>{
      var p=slots[pd.slot];if(!p)return;
      p.name=pd.name||'---';p.yomi=pd.yomi||'';p.rosterIdx=pd.rosterIdx;
      if(pd.lapCount)p.lapCount=pd.lapCount;
      if(pd.bestLap)p.bestLapMs=pd.bestLap;
      p.rssi=pd.rssi||-120;p.crossing=pd.crossing||false;
      if(pd.enter!==undefined){p.enterRssi=pd.enter;syncCalibSliders(pd.slot,pd.enter,p.exitRssi);}
      if(pd.exit!==undefined){p.exitRssi=pd.exit;syncCalibSliders(pd.slot,p.enterRssi,pd.exit);}
      activeSlotsLocal[pd.slot]=pd.rosterIdx;
      updateRaceCard(p);pushChart(p.id,p.rssi,p.crossing);
    });
    return;
  }
  if(d.type==='active_update'){
    (d.pilots||[]).forEach(pd=>{
      var p=slots[pd.slot];if(!p)return;
      p.name=pd.name||'---';p.yomi=pd.yomi||'';p.rosterIdx=pd.rosterIdx;
      if(pd.enter!==undefined){p.enterRssi=pd.enter;syncCalibSliders(pd.slot,pd.enter,p.exitRssi);}
      if(pd.exit!==undefined){p.exitRssi=pd.exit;syncCalibSliders(pd.slot,p.enterRssi,pd.exit);}
      activeSlotsLocal[pd.slot]=pd.rosterIdx;
      updateRaceCard(p);
    });
    buildCalibCards();
    return;
  }
  if(d.type==='scan'){
    // Item 8: 受信時刻を記録してオンライン判定に使用
    var prev=scanResults[d.mac]||{};
    scanResults[d.mac]=Object.assign(prev,{rssi:d.rssi,ts:d.ts,receivedAt:Date.now()});
    var found=rosterData.find(r=>r.uid&&r.uid.toUpperCase()===d.mac.toUpperCase());
    if(found){scanResults[d.mac].assignedRosterId=found.id;scanResults[d.mac].pilotName=found.name;}
    updateScanList();return;
  }
  if(d.type==='rssi'){
    var s=d.pilot;if(s<0||s>=N)return;
    var p=slots[s];
    p.rssi=d.rssi!==undefined?d.rssi:p.rssi;
    p.crossing=d.crossing!==undefined?d.crossing:p.crossing;
    if(d.name&&d.name!=='---')p.name=d.name;
    updateRaceCard(p);
    var calR=document.getElementById('calRssi'+s);if(calR)calR.textContent=p.rssi;
    pushChart(s,p.rssi,p.crossing);
    return;
  }
  if(d.type==='lap'){
    var s=d.pilot;if(s<0||s>=N)return;
    var p=slots[s];
    if(d.name&&d.name!=='---')p.name=d.name;
    if(d.yomi!==undefined)p.yomi=d.yomi;
    p.lapCount=d.lapCount!==undefined?d.lapCount:p.lapCount+1;
    var lapMs=d.lapTime||0;
    p.lapTimes.push(lapMs);p.cumulative+=lapMs;
    if(lapMs>0&&(!p.bestLapMs||lapMs<p.bestLapMs))p.bestLapMs=lapMs;
    updateRaceCard(p);addLapRow(p,lapMs,p.cumulative);checkFinished(p);
    if(d.newBest||lapMs===p.bestLapMs)sfx.best();
    else speak(buildSpeech(p,p.lapCount,lapMs));
    return;
  }
  if(d.type==='race_start'){
    raceRunning=true;setBtns(true);startTimer();
    slots.forEach(p=>{p.lapCount=0;p.bestLapMs=0;p.lapTimes=[];p.cumulative=0;
      document.getElementById('lapBody'+p.id).innerHTML='';
      document.getElementById('rcDelta'+p.id).textContent='';
      updateRaceCard(p);});
    return;
  }
  if(d.type==='race_stop'){raceRunning=false;setBtns(false);stopTimer();return;}
  if(d.type==='sd_restore_done'){
    // SDから復元完了 → ロースターを再読込
    toast('✅ SDから'+((d.pilots&&JSON.parse(d.pilots).length)||'?')+'人分を復元しました',3000);
    loadRoster();
    return;
  }
}

function syncCalibSliders(id,enter,exit_){
  var eEl=document.getElementById('calEnter'+id),eN=document.getElementById('calEnterN'+id);
  var xEl=document.getElementById('calExit'+id),xN=document.getElementById('calExitN'+id);
  if(eEl)eEl.value=enter;if(eN)eN.value=enter;if(xEl)xEl.value=exit_;if(xN)xN.value=exit_;
}

// SDカードセクションの表示/非表示 (Item 7)
function updateSdSection(present){
  sdPresent=present;
  var sec=document.getElementById('sdSection');
  if(sec)sec.style.display=present?'block':'none';
}

// ═══════════════════════════════════════════════════════════════════
// APIからの読み込み
// ═══════════════════════════════════════════════════════════════════
async function loadRoster(){
  try{
    var r=await fetch('/api/pilots');if(!r.ok)return;
    rosterData=await r.json();
    renderRoster();
    // アクティブスロット名を更新
    applyActiveToSlots();
    buildRaceCards();
    // スキャン結果とクロスリファレンス
    Object.keys(scanResults).forEach(function(mac){
      var found=rosterData.find(r=>r.uid&&r.uid.toUpperCase()===mac.toUpperCase());
      if(found){scanResults[mac].assignedRosterId=found.id;scanResults[mac].pilotName=found.name;}
    });
    updateScanList();
  }catch(e){}
}

async function loadAll(){
  // SDカード状態を確認
  try{
    var rs=await fetch('/api/sd/status');
    if(rs.ok){var sd=await rs.json();updateSdSection(sd.present);}
  }catch(e){}

  // アクティブ選択を先に読み込む
  try{
    var ra=await fetch('/api/active');if(ra.ok){
      var active=await ra.json();
      active.forEach(a=>{
        activeSlotsLocal[a.slot]=a.rosterIdx;
        var p=slots[a.slot];p.rosterIdx=a.rosterIdx;p.name=a.name||'---';p.yomi=a.yomi||'';
        if(a.enter!==undefined)p.enterRssi=a.enter;
        if(a.exit!==undefined)p.exitRssi=a.exit;
      });
    }
  }catch(e){}

  // ロースターを読み込む
  try{
    var rp=await fetch('/api/pilots');if(rp.ok){
      rosterData=await rp.json();
      renderRoster();
      applyActiveToSlots();buildRaceCards();buildCalibCards();
    }
  }catch(e){}

  // キャリブ閾値を再確認 (アクティブAPIから)
  try{
    var rc=await fetch('/api/active');if(rc.ok){
      var ac=await rc.json();
      ac.forEach(a=>{
        var p=slots[a.slot];
        if(a.enter!==undefined){p.enterRssi=a.enter;syncCalibSliders(a.slot,a.enter,p.exitRssi);}
        if(a.exit!==undefined){p.exitRssi=a.exit;syncCalibSliders(a.slot,p.enterRssi,a.exit);}
      });
    }
  }catch(e){}

  // スキャン結果を読み込む
  try{
    var rsc=await fetch('/api/scan');if(rsc.ok){
      (await rsc.json()).forEach(s=>{
        scanResults[s.mac]=Object.assign(scanResults[s.mac]||{},{rssi:s.rssi,ts:s.ts});
        var found=rosterData.find(r=>r.uid&&r.uid.toUpperCase()===s.mac.toUpperCase());
        if(found){scanResults[s.mac].assignedRosterId=found.id;scanResults[s.mac].pilotName=found.name;}
      });
      updateScanList();
    }
  }catch(e){}

  // UI設定を復元
  var am=document.getElementById('announceMode');if(am)am.value=announceMode;
  var sr=document.getElementById('speechRate');if(sr)sr.value=speechRate;
  var srN=document.getElementById('speechRateN');if(srN)srN.value=speechRate;
  refreshVoiceBtns();

  slots.forEach(p=>updateRaceCard(p));
}

// ═══════════════════════════════════════════════════════════════════
// 初期化
// ═══════════════════════════════════════════════════════════════════
buildRaceCards();
buildCalibCards();
wsConnect();
loadAll();
</script>
