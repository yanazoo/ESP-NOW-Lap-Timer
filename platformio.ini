; ELRS Backpack Lap Timer — PlatformIO configuration
;
; Environments:
;   gate_node        : ESP32-WROVER-E-A  — Promiscuous/RSSI node
;   web_node         : XIAO ESP32-S3-B   — WiFi AP + Web UI node
;   aircraft_node    : XIAO ESP32-C3     — ESP-NOW beacon
;   aircraft_node_c6 : XIAO ESP32-C6     — ESP-NOW beacon (WiFi 6 board)

[platformio]
data_dir = data

[env]
monitor_speed = 115200
lib_ldf_mode  = deep+

; ─────────────────────────────────────────────
; Gate Node  (ESP32-WROVER-E)
; ─────────────────────────────────────────────
[env:gate_node]
platform  = espressif32
board     = esp32dev
framework = arduino
build_src_filter = +<gate_node/>
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; ─────────────────────────────────────────────
; Aircraft Node  (XIAO ESP32-C3)
; ─────────────────────────────────────────────
[env:aircraft_node]
platform  = espressif32
board     = seeed_xiao_esp32c3
framework = arduino
build_src_filter = +<aircraft_node/>

; ─────────────────────────────────────────────
; Aircraft Node  (XIAO ESP32-C6)
; espressif32 7.x bundles arduino-esp32 v2.x which lacks ESP32-C6
; support. pioarduino is a maintained fork that ships arduino-esp32
; v3.x with proper C6 build scripts included.
; boards/xiao_esp32c6.json provides the board definition.
; ─────────────────────────────────────────────
[env:aircraft_node_c6]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board     = xiao_esp32c6
framework = arduino
build_src_filter = +<aircraft_node/>

; ─────────────────────────────────────────────
; Web Node  (XIAO ESP32-S3)
; ─────────────────────────────────────────────
[env:web_node]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
build_src_filter = +<web_node/>
board_build.filesystem = littlefs
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.3.0
    bblanchon/ArduinoJson @ ^7.0.0
