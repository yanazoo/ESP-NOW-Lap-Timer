; ELRS Lap Timer — PlatformIO configuration
;
; Environments:
;   gate_ep1   : EP1/EP2 TCXO (ESP8285) — ELRS FHSS sniffer (flash 1 per pilot slot)
;   gate_node  : ESP32-WROVER-E-A        — ESP-NOW receiver + EMA lap detection
;   web_node   : XIAO ESP32-S3-B         — WiFi AP + Web UI node
;
; Aircraft Node (XIAO ESP32-C3/C6) is no longer flashed; drones use their
; own EP1/EP2 TCXO with standard ELRS firmware bound to the pilot's TX.

[platformio]
data_dir = data

[env]
monitor_speed = 115200
lib_ldf_mode  = deep+
extra_scripts = pre:extra_script.py

; ─────────────────────────────────────────────
; Gate EP1 Sniffer  (EP1/EP2 TCXO = ESP8285)
; Flash one unit per pilot slot (4 units total for 4 pilots).
; ─────────────────────────────────────────────
[env:gate_ep1]
platform      = espressif8266
board         = esp8285
framework     = arduino
upload_speed  = 921600
monitor_speed = 115200
build_src_filter = +<gate_ep1/>
build_flags =
    -D GATE_EP1
lib_deps =
    ; Add SX1280 driver dependency once selected in Step 2.
    ; Option A: vendor a trimmed SX1280 driver from the ELRS repo.
    ; Option B: a standalone SX1280 Arduino lib (validate 2.4GHz LoRa support).

; ─────────────────────────────────────────────
; Gate Node  (ESP32-WROVER-E / LilyGo TTGO T8 V1.8)
; ─────────────────────────────────────────────
[env:gate_node]
platform  = espressif32
board     = esp32dev
framework = arduino
build_src_filter = +<gate_node/>
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; ─────────────────────────────────────────────
; Web Node  (XIAO ESP32-S3)
; ─────────────────────────────────────────────
[env:web_node]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
build_src_filter = +<web_node/>
board_build.filesystem = littlefs
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.3.0
    bblanchon/ArduinoJson @ ^7.0.0
